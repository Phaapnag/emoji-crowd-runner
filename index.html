<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Emoji Crowd Runner</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #0a0a0a;  /* 屏幕外背景 - 純黑色 */
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .game-container {
        position: relative;
        width: 390px;
        height: 844px;
        max-width: 100vw;
        max-height: calc(100vh - 20px);
        background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%);  /* 遊戲區域背景 - 深紫色 */
        overflow: hidden;
        flex-shrink: 0;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      #score {
        position: absolute;
        top: 15px;
        right: 15px;
        color: #ffffff;
        font-size: 18px;
        font-weight: bold;
        font-family: sans-serif;
        z-index: 100;
        text-shadow: 2px 2px 4px #000;
        pointer-events: none;
      }
      #battleOverlay {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ff4444;
        font-size: 72px;
        font-weight: bold;
        font-family: sans-serif;
        text-align: center;
        z-index: 100;
        text-shadow: 3px 3px 6px #000;
        pointer-events: none;
      }
      #battleStatusOverlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ffffff;
        font-size: 48px;
        font-weight: bold;
        font-family: sans-serif;
        z-index: 100;
        text-shadow: 2px 2px 4px #000;
        pointer-events: none;
        text-align: center;
      }
      #debugOverlay {
        position: absolute;
        bottom: 15px;
        left: 15px;
        color: #ffffff;
        font-size: 12px;
        font-family: monospace;
        z-index: 100;
        text-shadow: 1px 1px 2px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div id="score">🛒 0</div>
      <div id="battleOverlay"></div>
      <div id="battleStatusOverlay"></div>
      <div id="debugOverlay"></div>
      <script type="module" src="/src/main.ts?v=10-FORCE-NEW"></script>
    </div>
  </body>
</html>
