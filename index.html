<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Emoji Crowd Runner</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000; 
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .game-container {
        position: relative;
        width: 390px;
        height: 844px;
        background: linear-gradient(180deg, #ff6b6b 0%, #feca57 25%, #48dbfb 50%, #5f27cd 75%, #ff9ff3 100%);
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #score {
        position: absolute;
        top: 15px;
        right: 15px;
        color: #fff;
        font-size: 22px;
        font-weight: bold;
        font-family: sans-serif;
        z-index: 9999;
        text-shadow: 1px 1px 3px #000;
        pointer-events: none;
      }
      #battleOverlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 48px;
        font-weight: bold;
        font-family: sans-serif;
        text-align: center;
        z-index: 9998;
        text-shadow: 2px 2px 4px #000;
        pointer-events: none;
      }
      #battleStatusOverlay {
        position: absolute;
        top: 15px;
        left: 15px;
        color: #fff;
        font-size: 24px;
        font-weight: bold;
        font-family: sans-serif;
        z-index: 9999;
        text-shadow: 1px 1px 3px #000;
        pointer-events: none;
      }
      #debugOverlay {
        position: absolute;
        bottom: 15px;
        left: 15px;
        color: #fff;
        font-size: 12px;
        font-family: monospace;
        z-index: 9997;
        text-shadow: 1px 1px 2px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <div id="score">🛒 0</div>
      <div id="battleOverlay"></div>
      <div id="battleStatusOverlay"></div>
      <div id="debugOverlay"></div>
      <script type="module" src="/src/main.ts?v=8-FORCE-NEW"></script>
    </div>
  </body>
</html>
